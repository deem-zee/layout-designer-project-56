<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал «Music Box»</title>
    <link rel="stylesheet" href="scss/app.css">
</head>
<body>
    <header>
        <div class="container flex-row align-center">
            <div class="logo flex-row align-center">
                <img src="./images/logo.svg" alt="logo" class="logo-img">
                <span class="ml-16 text-header">Music Box</span>
            </div>
            <ul class="navigation flex-row align-center text-header">
                <li class="navigation-item ml-90">Главная</li>
                <li class="navigation-item ml-25">Каталог</li>
                <li class="navigation-item ml-25">Исполнители</li>
                <li class="navigation-item ml-25">Контакты</li>
            </ul>
            <input type="text" placeholder="поиск..." class="search text-header">
        </div>
    </header>
    <main>
        <div id="page-description" class="page-description">
            <div class="container">
                <h1>Онлайн музыка где угодно</h1>
                <h2>без ограничений</h2>
                <p class="description">Получите доступ всего за несколько шагов. Заполните форму ниже и откройте мир музыки</p>
                <form action="#" class="form-access flex-row">
                    <input type="text" class="input-access pl-20" placeholder="Имя">
                    <input type="text" class="input-access pl-20" placeholder="Email">
                    <input type="submit" value="Получить доступ" class="submit-access">
                </form>
            </div>
        </div>
    </main>
</body>
</html>
