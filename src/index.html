<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал «Music Box»</title>
    <link rel="stylesheet" href="scss/app.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="./images/logo.svg" alt="">
                <span>Music Box</span>
            </div>
                <div class="header-menu">Главная</div>
                <div class="header-menu">Каталог</div>
                <div class="header-menu">Исполнители</div>
                <div class="header-menu">Контакты</div>
                <input type="text" class="search" placeholder="поиск...">
            </div>
        </div>
    </header>
    <main>
        <div id="page-description">
            <h1>Онлайн музыка где угодно</h1>
            <h2>без ограничений</h2>
            <p>Получите доступ всего за несколько шагов. Заполните форму ниже и откройте мир музыки</p>
            <form action="#">
                <input type="text" placeholder="Имя" class="form-input">
                <input type="text" placeholder="Email" class="form-input">
                <input type="submit" value="Получить доступ" class="access-btn">
            </form>
        </div>
    </main>
</body>
</html>
