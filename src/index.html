<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал «Music Box»</title>
    <link rel="stylesheet" href="scss/app.css">
</head>
<body>
    <header class="flex-row justify-center">
        <div class="header container flex-row align-center">
            <div class="logo">
                <img src="./images/logo.svg" alt=""  class="mr-16">
                <span class="mr-90">Music Box</span>
            </div>
                <div class="header-menu">Главная</div>
                <div class="header-menu ml-25">Каталог</div>
                <div class="header-menu ml-25">Исполнители</div>
                <div class="header-menu ml-25">Контакты</div>
                <input type="text" class="search" placeholder="поиск...">
            </div>
        </div>
    </header>
    <main>
        <div id="page-description" class="flex-row justify-center">
            <div class="container flex-column align-center">
              <h1>Онлайн музыка где угодно</h1>
              <h2>без ограничений</h2>
              <p class="description">Получите доступ всего за несколько шагов. Заполните форму ниже и откройте мир музыки</p>
              <form action="#" class="access flex-row">
                  <input type="text" placeholder="Имя" class="access-input pl-20">
                  <input type="text" placeholder="Email" class="access-input pl-20">
                  <input type="submit" value="Получить доступ" class="access-btn">
              </form>  
            </div>
        </div>
    </main>
</body>
</html>
