<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портал «Music Box»</title>
    <link rel="stylesheet" href="scss/app.css">
</head>
<body>
    <header>
        <div class="header container flex-row align-center">
            <div class="logo flex-row align-center mr-90">
                <img src="./images/logo.svg" alt="logo" class="logo-img ">
                <span class="text-standart text-uppercase ml-16">music box</span>
            </div>
            <ul class="flex-row nav">
                <li class="nav-item text-standart text-uppercase no-li-decor">Главная</li>
                <li class="nav-item text-standart text-uppercase no-li-decor ml-25">Каталог</li>
                <li class="nav-item text-standart text-uppercase no-li-decor ml-25">Исполнители</li>
                <li class="nav-item text-standart text-uppercase no-li-decor ml-25">Контакты</li>
            </ul>
            <input type="text" class="search text-standart text-uppercase pl-10 pr-10 pt-5 pb-5" placeholder="поиск...">
        </div>
    </header>
    <main>
        <div id="page-description" class="page-description pt-200 pb-200">
            <div class="container text-center flex-column">
                <h1 class="mt-0 mb-0 text-uppercase text-center white">Онлайн музыка где угодно</h1>
                <h2 class="mt-0 mb-0 text-uppercase white">без ограничений</h2>
                <p class="page-description-text text-standart white text-center mt-30">Получите доступ всего за несколько шагов. Заполните форму ниже и откройте мир музыки</p>
                <form action="#" class="registration flex-row">
                    <input type="text" class="registration-input bg-transparent pl-20" placeholder="Имя" >
                    <input type="text" class="registration-input bg-transparent pl-20" placeholder="Email">
                    <input type="submit" value="Получить доступ" class="white bg-green btn registration-submit text-uppercase">
                </form>
            </div>
        </div>
    </main>
</body>
</html>
